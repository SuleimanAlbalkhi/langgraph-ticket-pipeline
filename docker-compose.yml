services:
  fastapi-service:
    build:
      context: ./fastapi-service
      dockerfile: Dockerfile
    container_name: hybrid-ai-fastapi
    # Nur an localhost gebunden statt 0.0.0.0 — der Service ist damit NICHT aus dem
    # LAN/WLAN erreichbar, nur vom eigenen Rechner. n8n erreicht ihn unabhängig davon
    # intern über das Docker-Netz (http://fastapi-service:8000).
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_FAST_MODEL: "qwen2.5:3b"
      OLLAMA_SMART_MODEL: "qwen2.5:3b"
      OLLAMA_TIMEOUT: "60"
      DEBUG: "false"
      LOG_LEVEL: "INFO"
      MAX_CONCURRENT_ANALYSES: "4"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: hybrid-ai-n8n
    # Editor ebenfalls nur lokal erreichbar (nicht aus dem LAN).
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: "localhost"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: "Europe/Berlin"
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    depends_on:
      - fastapi-service
    restart: unless-stopped

volumes:
  n8n_data:



networks:                   
  default:
    name: hybrid-ai-network