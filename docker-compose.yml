# Gemeinsame Log-Rotation für alle Services (verhindert volllaufende Platte).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  fastapi-service:
    build:
      context: ./fastapi-service
      dockerfile: Dockerfile
    container_name: hybrid-ai-fastapi
    # Nur an localhost gebunden statt 0.0.0.0 — der Service ist damit NICHT aus dem
    # LAN/WLAN erreichbar, nur vom eigenen Rechner. n8n erreicht ihn unabhängig davon
    # intern über das Docker-Netz (http://fastapi-service:8000).
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_FAST_MODEL: "qwen2.5:3b"
      OLLAMA_SMART_MODEL: "qwen2.5:3b"
      OLLAMA_TIMEOUT: "60"
      DEBUG: "false"
      LOG_LEVEL: "INFO"
      # App-seitige Drossel (Load-Shedding). Default 2 ist auf ~4 GB VRAM abgestimmt,
      # da eine einzelne Analyse intern schon bis zu 3 parallele LLM-Votes auslöst.
      MAX_CONCURRENT_ANALYSES: "${MAX_CONCURRENT_ANALYSES:-2}"
      # Hinweis: Der tatsächliche GPU-Parallelitätsgrad wird von OLLAMA_NUM_PARALLEL
      # gesteuert — das ist KEINE Variable dieses Containers, sondern gehört auf den
      # HOST, wo `ollama serve` läuft (Ollama ist hier nicht containerisiert).
      # Einstellung siehe .env.example.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    logging: *default-logging

  n8n:
    # Feste Version statt :latest — reproduzierbar, kein Bruch durch automatische Updates.
    image: n8nio/n8n:2.23.3
    container_name: hybrid-ai-n8n
    # Editor ebenfalls nur lokal erreichbar (nicht aus dem LAN).
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      N8N_HOST: "localhost"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      WEBHOOK_URL: "http://localhost:5678/"
      GENERIC_TIMEZONE: "Europe/Berlin"
      N8N_SECURE_COOKIE: "false"
      # Verschlüsselungsschlüssel für gespeicherte Credentials — aus .env (gitignored),
      # damit er stabil/reproduzierbar ist statt zufällig im Volume generiert zu werden.
      N8N_ENCRYPTION_KEY: "${N8N_ENCRYPTION_KEY:?Bitte N8N_ENCRYPTION_KEY in .env setzen}"
      # Ausführungshistorie automatisch beschneiden (Platte schonen + DSGVO: PII nicht ewig halten).
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"   # Stunden = 7 Tage
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    depends_on:
      - fastapi-service
    restart: unless-stopped
    # Healthcheck: macht in `docker ps` sichtbar, ob n8n wirklich bereit ist.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

volumes:
  n8n_data:



networks:                   
  default:
    name: hybrid-ai-network